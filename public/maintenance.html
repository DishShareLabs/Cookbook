<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance - Dishshare</title>
    <link rel="stylesheet" href="/styles.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Oxygen", "Ubuntu", "Cantarell", "Fira Sans", "Droid Sans", "Helvetica Neue", sans-serif;
        }
        
        .maintenance-container {
            text-align: center;
            background: white;
            padding: 60px 40px;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 90%;
        }
        
        .maintenance-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: pulse 2s ease-in-out infinite;
        }
        
        h1 {
            color: #333;
            font-size: 32px;
            margin: 20px 0;
            font-weight: 600;
        }
        
        p {
            color: #666;
            font-size: 16px;
            line-height: 1.6;
            margin: 15px 0;
        }
        
        .maintenance-message {
            color: #764ba2;
            font-size: 18px;
            font-weight: 500;
            margin: 30px 0;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 8px;
            border-left: 4px solid #764ba2;
        }
        
        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            background: #ff9800;
            border-radius: 50%;
            margin-right: 8px;
            animation: blink 1.5s ease-in-out infinite;
        }
        
        .footer-text {
            color: #999;
            font-size: 14px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.6;
            }
        }
        
        @keyframes blink {
            0%, 49%, 100% {
                opacity: 1;
            }
            50%, 99% {
                opacity: 0.3;
            }
        }
    </style>
</head>
<body>
    <div class="maintenance-container">
        <div class="maintenance-icon">🔧</div>
        <h1>Scheduled Maintenance</h1>
        <p>We're currently performing scheduled maintenance to improve your experience.</p>
        
        <div class="maintenance-message" id="maintenanceMessageContainer">
            <span class="status-indicator"></span>
            <span id="maintenanceMessage">Dishshare will be back online shortly.</span>
        </div>
        
        <p>We appreciate your patience while we make improvements.</p>
        
        <div class="footer-text">
            <p>Please check back soon!</p>
        </div>
    </div>

    <script>
        // Fetch the actual maintenance message from the server
        async function loadMaintenanceMessage() {
            try {
                const response = await fetch('/api/config/');
                if (response.ok) {
                    const data = await response.json();
                    if (data.maintenanceMessage) {
                        document.getElementById('maintenanceMessage').textContent = data.maintenanceMessage;
                    }
                }
            } catch (error) {
                console.log('Could not fetch maintenance message');
            }
        }
        
        // Load message on page load
        loadMaintenanceMessage();
        
        // Refresh maintenance status every 30 seconds
        setInterval(loadMaintenanceMessage, 30000);
    </script>
</body>
</html>
